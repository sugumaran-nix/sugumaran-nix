<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" width="100%">
  <style>
    .t1 { animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s both; }
    .t2 { animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.45s both; }
    .t3 { animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) 0.75s both; }
    .ln { animation: expand 0.6s cubic-bezier(0.22,1,0.36,1) 0.35s both; transform-origin: left; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes expand {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
  </style>

  <rect width="900" height="300" fill="#000000"/>

  <line class="ln" x1="60" y1="170" x2="840" y2="170" stroke="#333333" stroke-width="0.8"/>

  <text class="t1"
    x="450" y="130"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#ffffff">
    Hello, I'm Sugumaran S!
  </text>

  <text class="t2"
    x="450" y="198"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
    font-size="19"
    font-weight="400"
    letter-spacing="1.5"
    fill="#aaaaaa">
    FULL STACK DEVELOPER  ·  AI / ML ENGINEER
  </text>

  <text class="t3"
    x="450" y="245"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="0.5"
    fill="#555555">
    Python  ·  Flask  ·  FastAPI  ·  React  ·  Next.js  ·  NLP  ·  WebSockets
  </text>
</svg>
