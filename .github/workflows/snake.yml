name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: sugumaran-nix
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ffffff&color_dots=#111111,#333333,#555555,#888888,#ffffff
            dist/github-contribution-grid-snake-dark.svg?color_snake=ffffff&color_dots=#111111,#333333,#555555,#888888,#ffffff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
