<svg viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg" width="100%">
  <style>
    .ft {
      font-family: 'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 2;
      fill: #888888;
    }
    /* Mobile: bump font-size so it stays readable when SVG is narrow */
    @media (max-width: 480px) {
      .ft { font-size: 26px; letter-spacing: 1; }
    }
    @media (max-width: 360px) {
      .ft { font-size: 30px; letter-spacing: 0.5; }
    }
    .ln { animation: expand 0.6s ease 0.1s forwards;
          transform-box:fill-box; transform-origin:50% 50%;
          transform:scaleX(0); opacity:0; }
    @keyframes expand {
      from { opacity:0; transform:scaleX(0); }
      to   { opacity:1; transform:scaleX(1); }
    }
  </style>

  <rect width="900" height="80" fill="#000000"/>
  <line class="ln" x1="60" y1="20" x2="840" y2="20" stroke="#222222" stroke-width="0.8"/>

  <text class="ft" x="450" y="52" text-anchor="middle">
    crafted by sugumaran-nix  ·  coimbatore, india  ·  2026
  </text>
</svg>
